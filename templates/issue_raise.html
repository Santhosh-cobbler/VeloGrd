<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>
</head>
<body style="background: #020617; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
    <form method="POST">
        <div style="background: #0f172a; border: 1px solid #ef4444; padding: 2rem; border-radius: 24px; width: 350px;">
            <h2 style="color: #ef4444; margin: 0;">Issue Raise</h2>
            <p style="color: #94a3b8; font-size: 0.8rem;">An email will be sent to the developer.</p>
            <textarea name="issue"    style="width: 100%; height: 100px; background: #020617; border: 1px solid #334155; border-radius: 12px; color: white; padding: 10px; margin: 15px 0; box-sizing: border-box;"></textarea>
            <button style="width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">Send Urgent Report</button>
            <a href="{{url_for('dashboard')}}" style="display: block; text-align: center; color: #64748b; text-decoration: none; margin-top: 15px; font-size: 0.8rem;">Cancel</a>
        </div>
    </form>
</body>
</html>
