<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloGrid | Upload</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .upload-card { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; padding: 2.5rem; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; position: relative; }
        
        .back-btn { position: absolute; top: 25px; right: 25px; color: #64748b; text-decoration: none; font-size: 0.8rem; font-weight: 600; border: 1px solid #334155; padding: 5px 12px; border-radius: 10px; transition: 0.3s; }
        .back-btn:hover { color: #22d3ee; border-color: #22d3ee; background: rgba(34, 211, 238, 0.05); }

        /* Combined Drop Zone */
        .drop-zone { border: 2px dashed #334155; padding: 50px 20px; border-radius: 24px; margin: 25px 0; transition: 0.3s; cursor: pointer; background: #0f172a; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .drop-zone:hover { border-color: #22d3ee; background: rgba(34, 211, 238, 0.05); }
        
        input[type="text"] { width: 100%; padding: 15px; background: #020617; border: 1px solid #334155; border-radius: 12px; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        input[type="text"]:focus { border-color: #22d3ee; }
        
        .submit-btn { width: 100%; padding: 16px; background: #22d3ee; color: #020617; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { transform: scale(1.02); opacity: 0.9; }
        
        .file-counter { font-size: 0.75rem; color: #22d3ee; font-weight: 700; display: none; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="upload-card">
        <a href="{{url_for('dashboard')}}" class="back-btn">Home</a>

        <h2 style="margin:0; letter-spacing: -1px;">Capture Data</h2>
        <p style="color: #64748b; font-size: 0.9rem;">Upload front & back images together</p>
        
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="client_name" placeholder="Client Name" required>
            
            <div class="drop-zone" onclick="document.getElementById('file-input').click()">
                <span style="font-size: 2rem;">📸</span>
                <small id="status-text" style="color: #94a3b8; font-weight: 600;">TAP TO SELECT 2 PHOTOS</small>
                <div id="counter" class="file-counter">0 FILES SELECTED</div>
                
                <input type="file" id="file-input" name="images" multiple accept="image/*" hidden onchange="updateStatus(this)">
            </div>

            <button type="submit" class="submit-btn">RUN EXTRACTION</button>
        </form>
    </div>

    <script>
        function updateStatus(input) {
            const statusText = document.getElementById('status-text');
            const counter = document.getElementById('counter');
            const fileCount = input.files.length;

            if (fileCount > 0) {
                statusText.innerText = 'PHOTOS READY ✅';
                statusText.style.color = '#22d3ee';
                counter.innerText = fileCount + ' IMAGE(S) ATTACHED';
                counter.style.display = 'block';
            }
        }
    </script>
</body>
</html>
